<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>줌강의 스케줄러</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1B3A5C;--navy2:#2A527A;
  --gold:#D4A94A;--gold-light:rgba(212,169,74,0.13);
  --blue:#87CEEB;--blue-light:rgba(135,206,235,0.18);
  --ivory:#FAF7F2;--white:#fff;
  --border:#E8E3DC;--shadow:0 2px 16px rgba(27,58,92,0.09);
  --red:#E57373;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--ivory);color:var(--navy);min-height:100dvh;padding-bottom:60px;word-break:keep-all;-webkit-tap-highlight-color:transparent}

/* HEADER */
.hd{background:var(--navy);padding:18px 16px 14px;text-align:center;position:sticky;top:0;z-index:20}
.hd h1{color:#fff;font-size:17px;font-weight:800}
.hd p{color:rgba(255,255,255,0.5);font-size:10px;margin-top:3px;letter-spacing:0.4px}
.legend{display:flex;gap:12px;justify-content:center;margin-top:9px}
.leg{display:flex;align-items:center;gap:5px;font-size:10px;color:rgba(255,255,255,0.7);font-weight:600}
.leg-dot{width:10px;height:10px;border-radius:3px}
.leg-dot.tue{background:var(--gold)}.leg-dot.thu{background:var(--blue)}

/* STEP INDICATOR */
.steps{display:flex;align-items:center;justify-content:center;gap:0;padding:16px 20px 4px}
.step-item{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.step-circle{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;border:2px solid var(--border);background:var(--white);color:var(--navy);opacity:0.4;transition:all .3s}
.step-circle.active{border-color:var(--navy);background:var(--navy);color:#fff;opacity:1}
.step-circle.done{border-color:var(--gold);background:var(--gold);color:#fff;opacity:1}
.step-label{font-size:9.5px;font-weight:600;color:var(--navy);opacity:0.4;text-align:center;transition:opacity .3s}
.step-label.active,.step-label.done{opacity:1}
.step-line{height:2px;flex:0.4;background:var(--border);margin-bottom:18px;transition:background .3s}
.step-line.done{background:var(--gold)}

/* CARD */
.card{background:var(--white);margin:10px 12px 0;border-radius:16px;padding:16px;box-shadow:var(--shadow)}
.card-title{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:12px}

/* INSTRUCTOR ADD */
.inst-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.inst-row input{flex:1;border:1.5px solid var(--border);border-radius:10px;padding:11px 12px;font-size:14px;font-family:inherit;color:var(--navy);background:var(--ivory);transition:border-color .2s}
.inst-row input:focus{outline:none;border-color:var(--gold)}
.inst-row input::placeholder{color:#C8C3BA;font-size:13px}
.btn-del{width:36px;height:36px;flex-shrink:0;border-radius:50%;border:1.5px solid #FFCDD2;background:#FFF5F5;color:var(--red);font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;line-height:1}
.btn-del:active{background:#FFCDD2}
.btn-add{width:100%;background:var(--ivory);color:var(--navy);border:1.5px dashed var(--border);border-radius:10px;padding:12px;font-size:14px;font-weight:700;font-family:inherit;margin-top:2px;cursor:pointer;transition:all .15s;letter-spacing:-0.3px}
.btn-add:active{border-color:var(--gold);color:var(--gold)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.field label{font-size:10px;color:var(--navy);opacity:0.5;font-weight:700;display:block;margin-bottom:4px}
input[type=text]{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:11px 12px;font-size:14px;font-family:inherit;color:var(--navy);background:var(--ivory);transition:border-color .2s}
input:focus{outline:none;border-color:var(--gold)}
input::placeholder{color:#C8C3BA;font-size:13px}

/* BUTTONS */
.btn-main{width:100%;background:var(--navy);color:#fff;border:none;border-radius:12px;padding:15px;font-size:15px;font-weight:700;font-family:inherit;margin-top:10px;cursor:pointer;transition:background .15s,transform .1s}
.btn-main:active{background:var(--navy2);transform:scale(0.98)}
.btn-gold{width:100%;background:var(--gold);color:#fff;border:none;border-radius:12px;padding:14px;font-size:14px;font-weight:700;font-family:inherit;margin-top:10px;cursor:pointer}
.btn-gold:active{opacity:.85}
.btn-outline{width:100%;background:transparent;border:1.5px solid var(--border);border-radius:12px;padding:13px;font-size:13px;font-family:inherit;color:var(--navy);cursor:pointer;margin-top:8px;font-weight:600}

/* ── STEP 2: AVAILABILITY ── */
.avail-section{margin:10px 12px 0}
.inst-avail-card{background:var(--white);border-radius:14px;padding:14px;box-shadow:var(--shadow);margin-bottom:10px}
.inst-avail-name{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:3px}
.inst-avail-sub{font-size:10px;color:var(--gold);font-weight:600;margin-bottom:10px}

/* Month group inside avail */
.mo-group{margin-bottom:10px}
.mo-label{font-size:10px;font-weight:700;color:var(--navy);opacity:0.45;letter-spacing:0.5px;margin-bottom:5px}
.date-chips{display:flex;flex-wrap:wrap;gap:5px}
.chip{
  padding:5px 10px;border-radius:20px;font-size:12px;font-weight:600;
  border:1.5px solid var(--border);background:var(--ivory);
  color:var(--navy);cursor:pointer;transition:all .15s;
  -webkit-user-select:none;user-select:none;
}
.chip.tue-on{background:var(--gold);border-color:var(--gold);color:#fff}
.chip.thu-on{background:var(--blue);border-color:var(--blue);color:var(--navy)}
.chip:active{transform:scale(0.94)}

.avail-tip{font-size:11px;color:var(--navy);opacity:0.4;text-align:center;padding:8px 0 4px;line-height:1.6}

/* Month accordion buttons */
.mo-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.mo-btn{
  padding:6px 13px;border-radius:20px;font-size:12px;font-weight:700;
  border:1.5px solid var(--border);background:var(--ivory);
  color:var(--navy);cursor:pointer;font-family:inherit;
  transition:all .15s;position:relative;
}
.mo-btn.has-sel{border-color:var(--gold);color:var(--gold)}
.mo-btn.open{background:var(--navy);color:#fff;border-color:var(--navy)}
.mo-btn.open.has-sel{background:var(--gold);border-color:var(--gold)}
.mo-btn .sel-count{
  position:absolute;top:-5px;right:-5px;
  background:var(--gold);color:#fff;
  width:16px;height:16px;border-radius:50%;
  font-size:9px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
}
.mo-panel{display:none;margin-bottom:10px}
.mo-panel.open{display:block}

/* ── MONTH TABS ── */
.tabs-wrap{display:flex;gap:6px;overflow-x:auto;padding:14px 12px 4px;scrollbar-width:none}
.tabs-wrap::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:7px 15px;border-radius:20px;font-size:12.5px;font-weight:700;background:var(--white);color:var(--navy);border:1.5px solid var(--border);cursor:pointer;transition:all .2s}
.tab.active{background:var(--navy);color:#fff;border-color:var(--navy)}

/* ── CALENDAR ── */
.cal-wrap{margin:8px 12px 0;background:var(--white);border-radius:16px;overflow:hidden;box-shadow:var(--shadow)}
.cal-header{background:var(--navy);padding:13px 16px;text-align:center}
.cal-header h2{color:#fff;font-size:16px;font-weight:700}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);background:var(--navy2)}
.dow{text-align:center;padding:8px 0;font-size:10px;font-weight:700;color:rgba(255,255,255,0.6);letter-spacing:0.5px}
.dow.sun{color:#FF8F8F}.dow.sat{color:var(--blue)}

.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);padding:5px}
.cal-cell{display:flex;flex-direction:column;align-items:center;padding:4px 2px 4px;border-radius:9px;margin:2px;min-height:54px;justify-content:flex-start}
.cal-cell.empty{background:transparent}
.cal-cell.sun .day-num{color:#E57373}
.cal-cell.sat .day-num{color:#5BA4C7}
.day-num{font-size:12px;font-weight:700;color:var(--navy);margin-bottom:2px;line-height:1}

.cal-cell.tue-class{background:var(--gold-light);border:1.5px solid rgba(212,169,74,0.28);cursor:pointer}
.cal-cell.tue-class .day-num{color:var(--gold)}
.cal-cell.thu-class{background:var(--blue-light);border:1.5px solid rgba(135,206,235,0.4);cursor:pointer}
.cal-cell.thu-class .day-num{color:#2196F3}
.cal-cell.tue-class:active,.cal-cell.thu-class:active{opacity:0.65}

.class-tag{font-size:7.5px;font-weight:700;border-radius:3px;padding:1px 4px;letter-spacing:0.2px;text-align:center;white-space:nowrap}
.tue-tag{background:var(--gold);color:#fff}
.thu-tag{background:var(--blue);color:var(--navy)}

.inst-name{font-size:9px;font-weight:600;color:var(--navy);text-align:center;line-height:1.2;margin-top:2px;width:100%;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.edit-hint{text-align:center;font-size:10px;color:var(--navy);opacity:0.3;padding:5px 0 10px;font-weight:500}

/* CONFLICT BADGE */
.conflict-dot{width:5px;height:5px;background:var(--red);border-radius:50%;position:absolute;top:3px;right:3px}
.cal-cell{position:relative}

/* 휴강 */
.cal-cell.off-class{background:#F5F5F5;border:1.5px solid #E0E0E0;cursor:pointer;opacity:0.75}
.cal-cell.off-class .day-num{color:#BDBDBD}
.off-tag{background:#9E9E9E;color:#fff;font-size:7.5px;font-weight:700;border-radius:3px;padding:1px 4px;letter-spacing:0.2px}
.btn-off{
  width:100%;background:#fff;color:var(--red);
  border:1.5px solid var(--red);border-radius:10px;
  padding:13px 14px;font-size:14px;font-family:inherit;font-weight:700;
  cursor:pointer;margin-bottom:8px;transition:all .15s;text-align:left;
}
.btn-off.active{background:var(--red);color:#fff}
.btn-off:active{opacity:.8}

/* MSG */
.msg-box{background:var(--ivory);border-radius:10px;padding:14px;font-size:12.5px;line-height:2;white-space:pre-wrap;color:var(--navy)}
.btn-copy{width:100%;background:var(--gold);color:#fff;border:none;border-radius:12px;padding:14px;font-size:14px;font-weight:700;font-family:inherit;margin-top:10px;cursor:pointer}
.btn-copy:active{opacity:.8}
.toast{text-align:center;font-size:12px;font-weight:600;color:var(--gold);margin-top:8px;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(10,25,45,0.55);z-index:100;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:500px;padding:20px 16px calc(env(safe-area-inset-bottom,0px)+24px);animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal h3{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:3px}
.modal-sub{font-size:11px;font-weight:700;letter-spacing:0.5px;margin-bottom:14px}
.modal-sub.tue{color:var(--gold)}.modal-sub.thu{color:#2196F3}
.inst-btn{display:block;width:100%;text-align:left;background:var(--ivory);border:1.5px solid var(--border);border-radius:10px;padding:13px 14px;font-size:14px;font-family:inherit;font-weight:600;color:var(--navy);cursor:pointer;margin-bottom:8px;transition:all .15s}
.inst-btn.selected{background:var(--navy);color:#fff;border-color:var(--navy)}
.inst-btn.preferred::after{content:'✓ 희망';font-size:10px;font-weight:700;color:var(--gold);margin-left:8px}
.inst-btn.selected.preferred::after{color:rgba(255,255,255,0.7)}
.btn-cancel{width:100%;background:transparent;border:1.5px solid var(--border);border-radius:10px;padding:12px;font-size:13px;font-family:inherit;color:var(--navy);cursor:pointer;margin-top:4px;font-weight:600}

/* NOTICE */
.notice{background:rgba(212,169,74,0.1);border:1px solid rgba(212,169,74,0.3);border-radius:10px;padding:10px 12px;font-size:11.5px;color:var(--navy);line-height:1.6;margin-top:10px}
.notice b{color:var(--gold)}

@media(max-width:360px){
  .cal-cell{min-height:46px;padding:3px 1px}
  .day-num{font-size:11px}.inst-name{font-size:8px}.class-tag{font-size:7px;padding:1px 3px}
}
</style>
</head>
<body>

<div class="hd">
  <h1>🛳 줌강의 스케줄러</h1>
  <p>2026년 5~12월 &nbsp;|&nbsp; 오후 9시 &nbsp;|&nbsp; Zoom</p>
  <div class="legend">
    <div class="leg"><div class="leg-dot tue"></div>화 · 크루즈멤버십</div>
    <div class="leg"><div class="leg-dot thu"></div>목 · 크루즈파트너십</div>
  </div>
</div>

<!-- STEP INDICATOR -->
<div class="steps" id="stepBar">
  <div class="step-item">
    <div class="step-circle active" id="sc1">1</div>
    <div class="step-label active" id="sl1">강사 입력</div>
  </div>
  <div class="step-line" id="sline1"></div>
  <div class="step-item">
    <div class="step-circle" id="sc2">2</div>
    <div class="step-label" id="sl2">희망 날짜</div>
  </div>
  <div class="step-line" id="sline2"></div>
  <div class="step-item">
    <div class="step-circle" id="sc3">3</div>
    <div class="step-label" id="sl3">달력 확인</div>
  </div>
</div>

<!-- ═══ STEP 1: 강사 입력 ═══ -->
<div id="step1">
  <div class="card">
    <div class="card-title">① 강사 설정</div>
    <div class="field" style="margin-bottom:10px"><label>강사 이름</label></div>
    <div id="instList"></div>
    <button class="btn-add" onclick="addInst()">＋ 강사 추가</button>
    <div class="grid2" style="margin-top:12px">
      <div class="field">
        <label>강의 시간</label>
        <input type="text" id="zTime" value="오후 9시" maxlength="20">
      </div>
      <div class="field">
        <label>줌 링크</label>
        <input type="text" id="zLink" placeholder="zoom.us/j/..." maxlength="120">
      </div>
    </div>
    <button class="btn-main" onclick="goStep2()">다음 → 희망 날짜 입력</button>
  </div>
</div>

<!-- ═══ STEP 2: 희망 날짜 ═══ -->
<div id="step2" style="display:none">
  <div class="card" style="margin-bottom:0">
    <div class="card-title">② 강사별 희망 날짜</div>
    <div class="notice">
      <b>탭해서 선택</b>하세요. 강사가 원하는 날짜를 먼저 우선 배정합니다.<br>
      아무것도 선택 안 하면 자동 순환 배정됩니다.
    </div>
  </div>
  <div class="avail-section" id="availSection"></div>
  <div style="margin:0 12px">
    <button class="btn-main" onclick="goStep3()">📅 스케줄 생성하기</button>
    <button class="btn-outline" onclick="goStep1()">← 이전으로</button>
  </div>
</div>

<!-- ═══ STEP 3: 달력 ═══ -->
<div id="step3" style="display:none">
  <div style="margin:10px 12px 0;display:flex;gap:8px">
    <button class="btn-outline" style="margin-top:0;flex:1" onclick="goStep2()">← 희망 날짜 수정</button>
  </div>
  <div class="tabs-wrap" id="tabs"></div>
  <div id="calArea"></div>

  <!-- 📅 월간 스케줄 공지 -->
  <div class="card" id="msgCard" style="margin-top:14px">
    <div class="card-title">📅 월간 스케줄 공지</div>
    <div class="msg-box" id="msgBox"></div>
    <button class="btn-copy" onclick="doCopy('msgBox','toast0')">📋 복사하기</button>
    <div class="toast" id="toast0">✅ 복사 완료!</div>
  </div>

  <!-- 🛳 화요일 멤버십 당일 공지 -->
  <div class="card" style="margin-top:10px">
    <div class="card-title">🛳 화요일 멤버십 당일 공지</div>
    <div class="date-chips" id="tueDateChips" style="margin-bottom:10px;flex-wrap:wrap;display:flex;gap:6px"></div>
    <div class="msg-box" id="tueMsg" style="font-size:13px;line-height:1.9"></div>
    <button class="btn-copy" style="background:var(--gold)" onclick="doCopy('tueMsg','toast1')">📋 복사하기</button>
    <div class="toast" id="toast1">✅ 복사 완료!</div>
  </div>

  <!-- 🤝 목요일 파트너십 당일 공지 -->
  <div class="card" style="margin-top:10px">
    <div class="card-title">🤝 목요일 파트너십 당일 공지</div>
    <div class="date-chips" id="thuDateChips" style="margin-bottom:10px;flex-wrap:wrap;display:flex;gap:6px"></div>
    <div class="msg-box" id="thuMsg" style="font-size:13px;line-height:1.9"></div>
    <button class="btn-copy" style="background:#2196F3" onclick="doCopy('thuMsg','toast2')">📋 복사하기</button>
    <div class="toast" id="toast2">✅ 복사 완료!</div>
  </div>

  <!-- 🚫 휴강 공지 -->
  <div class="card" id="offCard" style="margin-top:10px;display:none">
    <div class="card-title">🚫 휴강 공지</div>
    <div class="date-chips" id="offDateChips" style="margin-bottom:10px;flex-wrap:wrap;display:flex;gap:6px"></div>
    <textarea id="offMsg" style="width:100%;background:var(--ivory);border:1.5px solid var(--border);border-radius:10px;padding:14px;font-size:13px;line-height:1.9;font-family:inherit;color:var(--navy);resize:vertical;min-height:180px;outline:none"></textarea>
    <button class="btn-copy" style="background:#9E9E9E;margin-top:10px" onclick="doCopy('offMsg','toast3')">📋 복사하기</button>
    <div class="toast" id="toast3">✅ 복사 완료!</div>
  </div>
</div>

<!-- 강사 선택 모달 -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h3 id="modalTitle">강사 선택</h3>
    <div class="modal-sub" id="modalSub"></div>
    <div id="instBtns"></div>
    <button class="btn-cancel" onclick="closeModal()">취소</button>
  </div>
</div>

<script>
const YR=2026, MS=[5,6,7,8,9,10,11,12];
const MN={5:'5월',6:'6월',7:'7월',8:'8월',9:'9월',10:'10월',11:'11월',12:'12월'};
let inst=[], avail={}, sched={}, curM=5;
let editTarget=null;

function wdays(yr,mo,wd){
  const out=[],d=new Date(yr,mo-1,1);
  while(d.getMonth()===mo-1){if(d.getDay()===wd)out.push(new Date(d));d.setDate(d.getDate()+1);}
  return out;
}
function dateKey(d){return`${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`}

// ─── STEP 1 → 2
function goStep1(){
  setStep(1);
  document.getElementById('step2').style.display='none';
  document.getElementById('step1').style.display='block';
}

function goStep2(){
  inst=[];
  document.querySelectorAll('.inst-row input').forEach(el=>{
    const v=el.value.trim(); if(v) inst.push(v);
  });
  if(!inst.length){alert('강사 이름을 최소 1명 입력해주세요!');return;}
  inst.forEach(n=>{if(!avail[n])avail[n]={};});
  buildAvailUI();
  setStep(2);
  document.getElementById('step1').style.display='none';
  document.getElementById('step2').style.display='block';
  document.getElementById('step3').style.display='none';
}

// 현재 열린 월 패널 추적 {instName: openMonth}
const openMo={};

function buildAvailUI(){
  const sec=document.getElementById('availSection');
  sec.innerHTML='';

  const allDates=[];
  MS.forEach(m=>{
    wdays(YR,m,2).forEach(d=>allDates.push({d,day:'화',m}));
    wdays(YR,m,4).forEach(d=>allDates.push({d,day:'목',m}));
  });

  inst.forEach(name=>{
    // count selections per month for badge
    const selCount={};
    MS.forEach(m=>{
      selCount[m]=allDates.filter(x=>x.m===m&&avail[name]&&avail[name][dateKey(x.d)]).length;

          <button onclick="selectMo('${esc(name)}',${m},'목')" style="flex:1;padding:7px 4px;border:1.5px solid var(--blue);background:transparent;color:#2196F3;border-radius:8px;font-size:10.5px;font-weight:700;cursor:pointer;font-family:inherit">목요일 전체</button>
          <button onclick="clearMo('${esc(name)}',${m})" style="flex:1;padding:7px 4px;border:1.5px solid var(--border);background:transparent;color:var(--navy);opacity:0.5;border-radius:8px;font-size:10.5px;font-weight:600;cursor:pointer;font-family:inherit">초기화</button>

      </div>`;

    let html=`<div class="inst-avail-card">
      <div class="inst-avail-name">👤 ${name}</div>
      <div class="inst-avail-sub">월을 선택해서 날짜를 고르세요</div>
      ${moBtns}
      ${panels}
      <div style="display:flex;gap:6px;margin-top:4px;padding-top:10px;border-top:1px solid var(--border)">
        <button onclick="selectAll('${esc(name)}','화')" style="flex:1;padding:8px;border:1.5px solid var(--gold);background:transparent;color:var(--gold);border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit">화요일 5~12월 전체</button>
        <button onclick="selectAll('${esc(name)}','목')" style="flex:1;padding:8px;border:1.5px solid var(--blue);background:transparent;color:#2196F3;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit">목요일 5~12월 전체</button>
        <button onclick="clearAll('${esc(name)}')" style="flex:0 0 52px;padding:8px;border:1.5px solid var(--border);background:transparent;color:var(--navy);opacity:0.45;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit">전체<br>초기화</button>
      </div>

    sec.insertAdjacentHTML('beforeend',html);
  });
}

function toggleMo(name,m){
  openMo[name]= openMo[name]===m ? null : m;
  buildAvailUI();
}

function selectMo(name,m,day){
  const wd=day==='화'?2:4;
  if(!avail[name])avail[name]={};
  wdays(YR,m,wd).forEach(d=>{avail[name][dateKey(d)]=day;});
  buildAvailUI();
}
function clearMo(name,m){
  if(!avail[name])return;
  const allD=[...wdays(YR,m,2),...wdays(YR,m,4)];
  allD.forEach(d=>{delete avail[name][dateKey(d)];});
  buildAvailUI();
}

function esc(s){return s.replace(/'/g,"\\'")}

function toggleChip(name,key,day,el){
  if(!avail[name])avail[name]={};
  if(avail[name][key]){
    delete avail[name][key];
    el.className='chip';
  } else {
    avail[name][key]=day;
    el.className=day==='화'?'chip tue-on':'chip thu-on';
  }
}

function selectAll(name,day){
  const wd=day==='화'?2:4;
  if(!avail[name])avail[name]={};
  MS.forEach(m=>{
    wdays(YR,m,wd).forEach(d=>{avail[name][dateKey(d)]=day;});
  });
  buildAvailUI();
}
function clearAll(name){
  avail[name]={};
  buildAvailUI();
}

// ─── STEP 2 → 3
function goStep3(){
  buildSchedule();
  setStep(3);
  document.getElementById('step2').style.display='none';
  document.getElementById('step3').style.display='block';
  buildTabs();
  renderM(curM);
}

function buildSchedule(){
  sched={};
  const allDates=[];
  MS.forEach(m=>{
    wdays(YR,m,2).forEach(d=>allDates.push({d,day:'화',topic:'크루즈멤버십',m}));
    wdays(YR,m,4).forEach(d=>allDates.push({d,day:'목',topic:'크루즈파트너십',m}));
  });
  allDates.sort((a,b)=>a.d-b.d);

  // count assignments per instructor for balancing
  const cnt={};
  inst.forEach(n=>cnt[n]=0);

  // assign
  const assigned=allDates.map(({d,day,topic,m})=>{
    const key=dateKey(d);
    // who prefers this date?
    const pref=inst.filter(n=>avail[n]&&avail[n][key]);
    let chosen;
    if(pref.length===1){
      chosen=pref[0];
    } else if(pref.length>1){
      // pick the one with fewest assignments so far
      pref.sort((a,b)=>cnt[a]-cnt[b]);
      chosen=pref[0];
    } else {
      // no preference → least-assigned
      const sorted=[...inst].sort((a,b)=>cnt[a]-cnt[b]);
      chosen=sorted[0];
    }
    cnt[chosen]++;
    return {d,day,topic,m,ds:`${d.getMonth()+1}/${d.getDate()}`,ii:inst.indexOf(chosen)};
  });

  // group by month
  MS.forEach(m=>sched[m]=[]);
  assigned.forEach(r=>sched[r.m].push(r));
}

// ─── STEP INDICATOR
function setStep(n){
  [1,2,3].forEach(i=>{
    const c=document.getElementById(`sc${i}`),l=document.getElementById(`sl${i}`);
    if(i<n){c.className='step-circle done';l.className='step-label done';}
    else if(i===n){c.className='step-circle active';l.className='step-label active';}
    else{c.className='step-circle';l.className='step-label';}
  });
  [1,2].forEach(i=>{
    document.getElementById(`sline${i}`).className='step-line'+(i<n?' done':'');
  });
}

// ─── CALENDAR
function buildTabs(){
  const w=document.getElementById('tabs');
  w.innerHTML='';
  MS.forEach(m=>{
    const t=document.createElement('div');
    t.className='tab'+(m===curM?' active':'');
    t.textContent=MN[m];
    t.onclick=()=>switchM(m);
    w.appendChild(t);
  });
}
function switchM(m){
  curM=m;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',MS[i]===m));
  renderM(m);
}

function renderM(m){
  const rows=sched[m]; if(!rows) return;
  const lookup={};
  rows.forEach((r,i)=>{lookup[r.d.getDate()]=i;});
  const lastDay=new Date(YR,m,0).getDate();
  const startDow=new Date(YR,m-1,1).getDay();

  let cells='';
  for(let e=0;e<startDow;e++)cells+=`<div class="cal-cell empty"></div>`;
  for(let day=1;day<=lastDay;day++){
    const dow=new Date(YR,m-1,day).getDay();
    const isTue=dow===2,isThu=dow===4;
    const idx=lookup[day];
    let cls='cal-cell';
    if(dow===0)cls+=' sun';if(dow===6)cls+=' sat';

    if((isTue||isThu)&&idx!==undefined){
      const r=rows[idx];
      const isTueClass=r.day==='화';
      const chosenName=inst[r.ii]||'';
      const key=dateKey(r.d);
      const otherPref=inst.filter((n,j)=>j!==r.ii&&avail[n]&&avail[n][key]);

      if(r.off){
        cells+=`<div class="${cls} off-class" onclick="openModal(${m},${idx})">
          <span class="day-num">${day}</span>
          <span class="off-tag">휴강</span>
        </div>`;
      } else {
        cells+=`<div class="${cls} ${isTueClass?'tue-class':'thu-class'}" onclick="openModal(${m},${idx})">
          <span class="day-num">${day}</span>
          <span class="class-tag ${isTueClass?'tue-tag':'thu-tag'}">${isTueClass?'멤버십':'파트너십'}</span>
          <span class="inst-name">${chosenName}</span>
          ${otherPref.length?'<div class="conflict-dot"></div>':''}
        </div>`;
      }
    } else {
      cells+=`<div class="${cls}"><span class="day-num">${day}</span></div>`;
    }
  }

  document.getElementById('calArea').innerHTML=`
    <div class="cal-wrap">
      <div class="cal-header"><h2>2026년 ${MN[m]}</h2></div>
      <div class="cal-dow">
        ${['일','월','화','수','목','금','토'].map((d,i)=>`<div class="dow${i===0?' sun':i===6?' sat':''}">${d}</div>`).join('')}
      </div>
      <div class="cal-grid">${cells}</div>
      <div class="edit-hint">🖊 날짜 탭 → 강사 변경 / 휴강 설정 &nbsp;|&nbsp; 🔴 점 = 복수 희망</div>
    </div>`;

  renderMsg(m);
}

function openModal(m,idx){
  editTarget={m,idx};
  const r=sched[m][idx];
  const key=dateKey(r.d);
  document.getElementById('modalTitle').textContent=`${r.ds}(${r.day}) 설정`;
  const sub=document.getElementById('modalSub');
  sub.textContent=r.topic;
  sub.className=`modal-sub ${r.day==='화'?'tue':'thu'}`;

  const offBtn=`<button class="btn-off${r.off?' active':''}" onclick="toggleOff()">🚫 휴강${r.off?' (해제하려면 다시 탭)':''}</button>`;
  const instBtns=r.off ? '' : inst.map((n,j)=>{
    const isPref=avail[n]&&avail[n][key];
    return`<button class="inst-btn${j===r.ii?' selected':''}${isPref?' preferred':''}" onclick="pickInst(${j})">${n}</button>`;
  }).join('');

  document.getElementById('instBtns').innerHTML=offBtn+instBtns;
  document.getElementById('overlay').classList.add('open');
}

function toggleOff(){
  if(!editTarget)return;
  const {m,idx}=editTarget;
  sched[m][idx].off=!sched[m][idx].off;
  closeModal();
  renderM(m);
}

function pickInst(j){
  if(!editTarget)return;
  const {m,idx}=editTarget;
  sched[m][idx].ii=j;
  closeModal();
  renderM(m);
}
function closeModal(e){
  if(e&&e.target!==document.getElementById('overlay'))return;
  document.getElementById('overlay').classList.remove('open');
  editTarget=null;
}

let instCount=0;
function addInst(val=''){
  instCount++;

  const row=document.createElement('div');
  row.className='inst-row';

function removeInst(rowId){

  document.getElementById(rowId).remove();

function doCopy(boxId, toastId){
  const el=document.getElementById(boxId);
  const text=el.tagName==='TEXTAREA'?el.value:el.textContent;

    const t=document.getElementById(toastId);

    setTimeout(()=>t.classList.remove('show'),2200);
  });
}
